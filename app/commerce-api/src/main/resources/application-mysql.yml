spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:toy_commerce}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:toy_user}
    password: ${MYSQL_PASSWORD:toy_password}
  jpa:
    hibernate.ddl-auto: update
    properties.hibernate.format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug

