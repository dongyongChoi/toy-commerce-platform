spring:
  application:
    name: commerce-api
  profiles:
    default: local
    group:
      local-mysql:
        - local
        - mysql
      local-mysql-redis:
        - local
        - mysql
        - redis
      local-mysql-kafka:
        - local
        - mysql
        - kafka
      local-mysql-redis-kafka:
        - local
        - mysql
        - redis
        - kafka

management:
  endpoints:
    web:
      exposure:
        include: health,info
