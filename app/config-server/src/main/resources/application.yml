server:
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:file:./}
          search-paths: ${CONFIG_REPO_SEARCH_PATHS:config-repo}
          default-label: ${CONFIG_REPO_DEFAULT_LABEL:main}
          clone-on-start: ${CONFIG_REPO_CLONE_ON_START:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
